services:
  sanguo-rag-postgres:
    image: postgres:16
    container_name: sanguo-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sanguo_rag
      POSTGRES_USER: sanguo_user
      POSTGRES_PASSWORD: sanguo_pass
    ports:
      - "5432:5432"
    volumes:
      - sanguo_rag_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanguo_user -d sanguo_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sanguo_rag_pgdata:
