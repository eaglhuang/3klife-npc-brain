services:
  npc-brain:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: 3klife-npc-brain-dev
    environment:
      NPC_BRAIN_PORT: ${NPC_BRAIN_PORT:-8765}
      NPC_QDRANT_URL: ${NPC_BRAIN_QDRANT_URL:-http://host.docker.internal:6333}
      SANGUO_RAG_PG_DSN: ${NPC_BRAIN_PG_DSN:-postgresql://game_user:game_pass@host.docker.internal:5432/game_dev}
    ports:
      - "${NPC_BRAIN_HOST_PORT:-8765}:${NPC_BRAIN_PORT:-8765}"
    volumes:
      - .:/app
    working_dir: /app
    command: sh -lc "python -m uvicorn app.main:app --host 0.0.0.0 --port ${NPC_BRAIN_PORT:-8765} --reload"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys,urllib.request;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:${NPC_BRAIN_PORT:-8765}/healthz', timeout=2).status==200 else 1)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
